  - address: B-04
    title: Signature flow
    intent: Signing surface writing signatures and the recording event.
    status: open · verified
    cites: [IM, AM, PRD]
    ready_when: B-03 verified.
    deliverable: Signature capture, event row, confirmation.
    acceptance: Sign the membership agreement and see the signature recorded.
    resolution: >
      Inline signing added to techne.coop/commons/agreements/. Confirmation panel
      shows member name, agreement title, version, effective date, and binding statement.
      Three writes: signatures INSERT, signature.signed event INSERT, signature PATCH
      to link event_id. Verified by Todd Youngblood 2026-07-12: signed Bylaws of
      RegenHub LCA live. Signature: 0c8bde48, event: 8a81c3bb, signed_at:
      2026-07-12T20:28:22Z. Verification event: 86adb322-27a1-4d80-919b-04009e5c4071.
    escalation:
      standing_in: B-04, step 3 (link event_id to signature row)
      found: >
        The PATCH from the browser to set signatures.event_id was blocked by RLS.
        The signatures_self policy (AM v0.1) covers SELECT and INSERT only — no UPDATE
        clause exists. The event_id column on the live signature row (0c8bde48) was
        linked post-verification via service key. Any future signer will have the same
        gap: their signature and event are recorded and cross-referenced in the event
        payload, but signatures.event_id will remain null until patched server-side.
      the_question: >
        Should the fix be (a) a scoped UPDATE policy on signatures allowing the owning
        agent to set event_id on their own rows, or (b) a SECURITY DEFINER function
        that wraps all three writes atomically and eliminates the browser-side PATCH?
      a_default: >
        Proposed: option (b) — SECURITY DEFINER function sign_agreement(p_agreement_id uuid)
        that inserts the signature, inserts the event, and updates event_id in one
        transaction. Simpler RLS surface, atomic, no partial-write failure mode.
        Requires a new migration before G-B gate.
      decision: Option (b) approved by Todd Youngblood 2026-07-12.
      resolution: >
        sign_agreement(p_agreement_id uuid) SECURITY DEFINER function created and
        applied to CIS ujujwgopdwirebgcpekc. Migration: commons/authority-map/0003_sign_agreement.sql.
        agreements/index.html updated to call sb.rpc('sign_agreement') — three-step
        REST flow replaced with single atomic RPC. Applied 2026-07-12.

