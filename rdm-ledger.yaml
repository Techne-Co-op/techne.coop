# rdm-ledger.yaml · RDM v1 · Drafted
# Living roadmap for the Common Record Series build.
# The Common Record Series · RegenHub, LCA · July 2026
# Validator: scripts/validate.py — schema, acyclicity, gating.
# Status marks: drafted | anticipated | open · (blocker)
# No dates. Dependency is the schedule.
# 40 items: 7 series documents + 33 work packets across 6 trains.

