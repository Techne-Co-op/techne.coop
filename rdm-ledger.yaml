cross_cutting:

  - address: X-01
    title: Error boundary and observability
    intent: Errors surface to the steward without leaking to the member.
    status: open · verified
    cites: [BP, VS]
    ready_when: G0 attested.
    deliverable: Error logging, steward notification path.
    acceptance: An unhandled error produces a log entry, not a stack trace to the member.
    resolution: >
      Delivered assets/error-boundary.js: a dependency-free global boundary
      installed first in <head> on the four interactive surfaces (gatherings,
      agreements, directory, join). window error and unhandledrejection events
      produce a structured [techne:error] log entry and show the member a quiet
      house-style fallback, never a stack trace. The eleven handled-error call
      sites route through Techne.report(), which logs the internal detail for
      the steward and returns a plain member message; raw error.message is no
      longer rendered on any surface. Acceptance demonstrated by a node harness,
      nine assertions, all passing.
    decision: >
      Tier B decision, delegated by Todd 2026-07-17, drafted here for adoption
      by his review of this PR. The steward-visible persistence sink is modeled
      as a dedicated error_log table with steward-read row security, and is not
      folded into X-02 (Notices): errors are steward-facing operational
      telemetry, distinct from member-facing transactional notices, and
      conflating them mis-models both. The table is not built under X-01, for
      two reasons. First, X-01 acceptance is already met by the console
      observability channel: a [techne:error] entry is a log entry. Second, a
      persistent table has no value until the Authority Map anchors steward read
      access, since authority is not invented here, and until a steward surface
      exists to read it, since an unread table is deferred cost against the
      minimal-footprint rule. The sink therefore becomes its own minimal
      follow-on packet, gated on an AM entry for error_log read access, with
      persist() in error-boundary.js as the single seam to attach it and no
      call-site changes. X-01 proceeds toward verified on the console-channel
      acceptance. Adopted by Todd Youngblood's review and merge of PR 3,
      2026-07-20. Verified by Todd Youngblood 2026-07-20.

  - address: X-02
    title: Notices v1
    intent: Transactional email for admission, signature, and registration events.
    status: open · in-session
    cites: [BP, IM]
    ready_when: B-02 verified.
    deliverable: Email rail wired to key events.
    acceptance: Admission notice delivered on membership.state transition to applied.
    note: >
      The dependency card below carried its decision 2026-07-20 and the
      packet opened the same day; the rail is authored and awaits the
      steward's deployment steps.
    escalation:
      standing_in: X-02, before the first line of the email rail.
      found: >
        No email capability exists anywhere in the stack. Every candidate is a
        new external dependency: a sending service, its API key as a new
        secret, and a delivery path from database events to the sender. BP v1
        names new dependencies as stop-and-escalate.
      the_question: >
        Which transactional email dependency does the cooperative adopt for
        Notices v1?
      a_default: >
        Proposed: Resend on its free tier, called from a Supabase edge
        function triggered by a database webhook on the events insert for
        membership.applied. Rationale: no server to keep alive, the key lives
        in Supabase secrets under the reference-not-value rule, the free tier
        covers present volume, and the seam (one edge function) keeps the
        sender swappable if the cooperative outgrows it.
      decision: >
        Default adopted by Todd Youngblood 2026-07-20, directing X-02, X-03,
        and X-09 to begin. Rail delivered: notices edge function
