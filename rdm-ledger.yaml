substrate:

  - address: SUB-01
    title: Repository scaffold
    intent: Stand the repository on the estate layout with the validator reshaped to slices.
    status: open · verified
    cites: [BP]
    ready_when: SUB-01 is workable now.
    deliverable: rdm-ledger.yaml, scripts/validate.py, STATUS.md, .github/workflows/verify.yml
    acceptance: ledger-validate green. Repository tree matches estate layout.
    resolution: >
      All four deliverables present at canonical paths. ledger-validate green on main
      (CI run 29765440315, all six suites passing). Repository tree matches the estate
      layout of BP v1 as oriented at commons/build/instructions/ section 6; the one
      addition beyond that orientation, encyclopedia/, is enumerated in index.json.
      Verified by Todd Youngblood 2026-07-20. Unblocks SUB-02, X-04, X-05.

  - address: SUB-02
    title: Governing emissions at root
    intent: Install AGENTS.md, verify.yml, and commons.css at canonical paths.
    status: open · verified
    cites: [BP, VS, UI]
    ready_when: SUB-01 verified.
    deliverable: AGENTS.md (confirmed), .github/workflows/verify.yml, commons.css
    acceptance: style-lint and schema-lint green. AGENTS.md unchanged or updated to BP v1 §10.
    resolution: >
      All three emissions confirmed at canonical paths: AGENTS.md at root (unchanged,
      a faithful superset of BP v1 section 10), .github/workflows/verify.yml,
      commons.css at commons/ui/commons.css. style-lint and schema-lint green on main.
      PR 10 merged 2026-07-20. Consumption-model card decided the same day: inlining
      per page is the sanctioned emission; UI v1 sections 1 and 9 amended by decision
      record; drift detection assigned to X-06. Verified by Todd Youngblood 2026-07-20.
    escalation:
      standing_in: SUB-02, emission confirmation
      found: >
        The three emissions exist at canonical paths: AGENTS.md at root (a faithful
        superset of BP v1 section 10, adding REPO facts and pointers), verify.yml at
        .github/workflows/, commons.css at commons/ui/commons.css per UI v1. But two
        cited artifacts disagree on how site pages consume the token layer. AGENTS.md
        (REPO block) and the instructions page say tokens are inline per page, no
        compiled CSS. UI v1 sections 1 and 7 say site pages link commons.css and
        inline nothing, and call drift between copies a defect. Current practice is
        mixed: six pages link commons.css, the rest inline the layer.
      the_question: >
        Which consumption model governs site pages going forward: inline tokens per
        page, or a linked commons.css?
      a_default: >
        Proposed: inline per page remains the operative practice. It matches every
        verified slice page, the no-build-step philosophy, and self-contained
        deployability. UI v1's linking sentence is amended by decision record to name
        inlining as a sanctioned emission on site pages, and drift detection between
        inline copies and commons.css becomes part of X-06, the design token audit.
      decision: >
        Default adopted by Todd Youngblood 2026-07-20. Inlining per page is the
        sanctioned emission on site pages; linking commons.css remains valid where
        already in use. UI v1 sections 1 and 9 amended by this record. Drift
        detection between inline copies and commons.css moves to X-06.

  - address: SUB-03
    title: Provision database environment
    intent: Provision a fresh database environment and apply 0001_substrate.sql.
    status: open · verified
    cites: [IM, VS]
    ready_when: SUB-01 verified.
    deliverable: Supabase project with 0001_substrate.sql applied. db-verify green, first run.
    acceptance: All five invariant assertions pass. RLS enabled, no policies, deny-by-default.
    resolution: >
      Fresh project provisioned: ujujwgopdwirebgcpekc (techne-coop-cis, RegenHub LCA org,
      us-west-1). v2 project (dgcoffcanzwsuwgpocbt) decommissioned. 0001_substrate.sql
      applied 2026-07-11. All 13 tables + capital_accounts view confirmed. RLS enabled,
      no policies, deny-by-default. Seeded: 3 agents (Nou, Dianoia, RegenHub LCA) +
      1 agreement (BYLAWS v2). Decided by Todd Youngblood 2026-07-11.
    escalation:
      standing_in: SUB-03
      found: >
        The live v2 project (dgcoffcanzwsuwgpocbt) has conflicting tables:
        agents (different kind enum), agreements (different column names),
        plus 14 tables not in v3 (ledger_entries, peers, loop_events, etc.).
        187 agreement_sections rows carry bylaws text and embeddings — valuable data
        not represented in the v3 schema. 0001_substrate.sql cannot apply as-is.
      the_question: Do we provision a new Supabase project and migrate the three valuable
        rows from v2 (RegenHub LCA agent, Bylaws v2 agreement), or do we apply
        in-place ALTER TABLE migrations to dgcoffcanzwsuwgpocbt?
      decision: Completely fresh provision, no migration. Decided by Todd Youngblood,
        2026-07-11. v2 project (dgcoffcanzwsuwgpocbt) decommissioned 2026-07-11.

  - address: SUB-04
    title: Apply RLS policies
    intent: Apply 0002_policies.sql, flipping from deny-all to the AM v0.1 policy matrix.
    status: open · verified
    cites: [AM, VS]
    ready_when: SUB-03 verified.
    deliverable: Policies applied. rls-audit expectations sourced from AM v0.1 §5.
    acceptance: rls-audit green. Every policy carries a bylaw anchor comment.
    resolution: >
      0002_policies.sql applied 2026-07-11. 30 policies across 14 tables confirmed.
      appointment enum (director, secretary, treasurer, steward) created. role_grants
      table live with RLS. 5 helper functions (app_agent_id, app_is_member,
