<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<meta name="description" content="Gatherings calendar — RegenHub, LCA.">
<title>Gatherings &middot; Techne</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<script>
  (function () {
    try {
      var m = localStorage.getItem('techne-mode');
      if (!m) m = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-mode', m);
    } catch(e) {}
  })();
</script>
<style>
:root {
  --serif: 'Libre Baskerville', Georgia, serif;
  --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px; --s7: 48px;
  --dur: .4s; --micro: .16s; --ease: cubic-bezier(.4,0,.2,1);
}
html[data-mode="dark"] {
  --bg: #0F0F12; --inset: #08080A; --surface: #16161B; --raised: #232329;
  --line: #2A2A30; --rule: #3A3A42;
  --heading: #E8E4DF; --text: #CFCBC4; --muted: #8A857E; --faint: #5A554F;
  --ember: #C4956A; --ember-text: #D4A57A;
  --ok: #6A9A6A; --ok-dim: rgba(106,154,106,0.12);
  --warn: #C46A6A; --warn-dim: rgba(196,106,106,0.10);
  color-scheme: dark;
}
html[data-mode="light"] {
  --bg: #F7F5F0; --inset: #EBE7DF; --surface: #FCFBF8; --raised: #FEFDFB;
  --line: #D8D3C8; --rule: #9A958A;
  --heading: #1A1A1F; --text: #2E2C28; --muted: #646058; --faint: #A39E92;
  --ember: #8A6A4A; --ember-text: #6F5436;
  --ok: #4A7A4A; --ok-dim: rgba(74,122,74,0.10);
  --warn: #A84F4C; --warn-dim: rgba(168,79,76,0.10);
  color-scheme: light;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--serif);
  font-size: 16px; line-height: 1.65; min-height: 100vh; display: flex; flex-direction: column;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--s5); height: 48px; border-bottom: 1px solid var(--line);
  background: var(--surface); position: sticky; top: 0; z-index: 10;
}
.topbar-brand { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); text-decoration: none; }
.topbar-brand strong { color: var(--heading); font-weight: 500; }
.topbar-nav { display: flex; gap: var(--s4); align-items: center; }
.topbar-nav a { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); text-decoration: none; }
.topbar-nav a:hover { color: var(--heading); }
.mode-btn { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); background: none; border: 1px solid var(--line); border-radius: 4px; padding: 3px 8px; cursor: pointer; }
.mode-btn:hover { color: var(--heading); }

main { flex: 1; max-width: 720px; margin: 0 auto; padding: var(--s7) var(--s5); width: 100%; }
h1 { font-size: 1.75rem; font-weight: 700; color: var(--heading); margin-bottom: var(--s3); }
.section-rule { border-top: 2px solid var(--ember); width: 32px; margin: var(--s4) 0 var(--s5); }
.lead { color: var(--muted); margin-bottom: var(--s6); font-size: 0.95rem; }

/* auth gate */
#auth-gate { display: none; }
#auth-gate p { color: var(--muted); margin-bottom: var(--s5); }
.btn { font-family: var(--mono); font-size: 0.85rem; padding: 10px 24px; border-radius: 6px; border: none; cursor: pointer; }
.btn-primary { background: var(--ember); color: #fff; }
.btn-primary:hover { opacity: 0.88; }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
#magic-form { max-width: 400px; margin: 0 auto; }
#magic-form input[type=email] {
  width: 100%; background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
  color: var(--heading); font-family: var(--serif); font-size: 1rem; padding: 10px var(--s4);
  outline: none; margin-bottom: var(--s4);
}
#magic-form input:focus { border-color: var(--ember); }

#loading { text-align: center; padding: var(--s7) 0; color: var(--muted); font-family: var(--mono); font-size: 0.8rem; }
#content { display: none; }

.notice { padding: var(--s4); border-radius: 6px; margin: var(--s4) 0; font-size: 0.88rem; display: none; }
.notice.ok  { background: var(--ok-dim); color: var(--ok); border: 1px solid var(--ok); }
.notice.err { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn); }
.notice.info { background: rgba(106,138,196,0.10); color: var(--muted); border: 1px solid var(--line); }

/* gathering cards */
.gathering-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  margin-bottom: var(--s5);
  overflow: hidden;
}
.gathering-header {
  padding: var(--s4) var(--s5);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  gap: var(--s4);
}
.gathering-title {
  flex: 1;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--heading);
  margin-bottom: 4px;
}
.gathering-host {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
}
.gathering-host span { color: var(--ember-text); }

.upcoming-chip {
  font-family: var(--mono); font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
  background: var(--ok-dim); color: var(--ok); border: 1px solid var(--ok);
  white-space: nowrap; flex-shrink: 0;
}
.past-chip {
  font-family: var(--mono); font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
  background: var(--raised); color: var(--faint); border: 1px solid var(--line);
  white-space: nowrap; flex-shrink: 0;
}

/* sessions list */
.sessions-list { padding: var(--s4) var(--s5); }
.sessions-label {
  font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--faint); margin-bottom: var(--s3);
}
.session-row {
  display: flex; align-items: center; gap: var(--s4);
  padding: var(--s3) 0; border-bottom: 1px solid var(--line);
}
.session-row:last-child { border-bottom: none; }
.session-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--ember); flex-shrink: 0;
}
.session-dot.past { background: var(--faint); }
.session-time {
  font-family: var(--mono); font-size: 0.78rem; color: var(--text); flex: 1;
}
.session-duration { font-family: var(--mono); font-size: 0.7rem; color: var(--faint); }

/* registration controls */
.reg-btn {
  font-family: var(--mono); font-size: 0.72rem; padding: 4px 12px;
  border-radius: 4px; border: 1px solid var(--ember); background: transparent;
  color: var(--ember-text); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: background var(--micro) var(--ease), color var(--micro) var(--ease);
}
.reg-btn:hover { background: var(--ember); color: #fff; }
.reg-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.reg-btn.registered {
  border-color: var(--ok); color: var(--ok); background: var(--ok-dim);
}
.reg-btn.registered:hover { background: var(--ok); color: #fff; }
.reg-btn.cancelled {
  border-color: var(--faint); color: var(--faint); background: transparent;
}
.reg-btn.cancelled:hover { border-color: var(--ember); color: var(--ember-text); background: transparent; }

.no-sessions {
  padding: var(--s4) var(--s5); font-family: var(--mono); font-size: 0.78rem;
  color: var(--faint); font-style: italic;
}
.empty-state { text-align: center; padding: var(--s7) 0; color: var(--muted); }
.empty-state p { font-family: var(--mono); font-size: 0.85rem; }

footer {
  border-top: 1px solid var(--line); padding: var(--s4) var(--s5);
  font-family: var(--mono); font-size: 0.7rem; color: var(--faint); text-align: center;
}
footer a { color: var(--faint); }
</style>
</head>
<body>
<nav class="topbar">
  <a class="topbar-brand" href="/"><strong>Techne</strong> &middot; commons</a>
  <div class="topbar-nav">
    <a href="/commons/">commons</a>
    <a href="/commons/agreements/">agreements</a>
    <a href="/commons/directory/">directory</a>
    <button class="mode-btn" id="mode-btn">light / dark</button>
  </div>
</nav>

<main>
  <div id="loading">Loading&hellip;</div>

  <div id="auth-gate">
    <h1>Gatherings</h1>
    <div class="section-rule"></div>
    <p>Sign in to view the gatherings calendar.</p>
    <div id="magic-form">
      <div class="notice" id="magic-notice"></div>
      <input type="email" id="magic-email" placeholder="your@email.com" autocomplete="email">
      <button class="btn btn-primary" id="magic-btn">Send sign-in link</button>
    </div>
  </div>

  <div id="content">
    <h1>Gatherings</h1>
    <div class="section-rule"></div>
    <p class="lead">What is happening and who hosts it. Register or cancel your spot directly.</p>
    <div id="gatherings-list"></div>
  </div>
</main>

<footer>
  <span>CIS: ujujwgopdwirebgcpekc &middot; G-01, G-02 &middot; gatherings, sessions, registrations</span>
  &nbsp;&middot;&nbsp;
  <a href="/legal">legal</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://ujujwgopdwirebgcpekc.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqdWp3Z29wZHdpcmViZ2NwZWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3ODc3ODIsImV4cCI6MjA5OTM2Mzc4Mn0.v6atltp9vbEj0RN2stSuDrzOdWVHB9GGR6rwPCwBNEk';
let sb, currentAgentId;
// session_id → registration row (or null)
const regMap = {};

document.getElementById('mode-btn').addEventListener('click', function () {
  var cur = document.documentElement.getAttribute('data-mode');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-mode', next);
  try { localStorage.setItem('techne-mode', next); } catch(e) {}
});

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
}
function durationMinutes(startIso, endIso) {
  if (!endIso) return null;
  const mins = Math.round((new Date(endIso) - new Date(startIso)) / 60000);
  if (mins >= 60) { const h = Math.floor(mins/60), m = mins%60; return m > 0 ? `${h}h ${m}m` : `${h}h`; }
  return `${mins}m`;
}
function isPast(iso) { return new Date(iso) < new Date(); }

// ── Registration actions ──────────────────────────────────────────────────────

async function handleRegBtn(btn, sessionId) {
  const existing = regMap[sessionId];
  btn.disabled = true;

  if (!existing) {
    // INSERT new registration
    const { data, error } = await sb.from('registrations').insert({
      session_id: sessionId,
      agent_id:   currentAgentId,
      state:      'registered',
      at:         new Date().toISOString()
    }).select().single();
    if (error) { alert('Could not register: ' + error.message); btn.disabled = false; return; }
    regMap[sessionId] = data;
  } else if (existing.state === 'registered') {
    // UPDATE to cancelled
    const { data, error } = await sb.from('registrations')
      .update({ state: 'cancelled', at: new Date().toISOString() })
      .eq('id', existing.id)
      .select().single();
    if (error) { alert('Could not cancel: ' + error.message); btn.disabled = false; return; }
    regMap[sessionId] = data;
  } else {
    // UPDATE cancelled → registered
    const { data, error } = await sb.from('registrations')
      .update({ state: 'registered', at: new Date().toISOString() })
      .eq('id', existing.id)
      .select().single();
    if (error) { alert('Could not register: ' + error.message); btn.disabled = false; return; }
    regMap[sessionId] = data;
  }

  updateRegBtn(btn, sessionId);
}

function updateRegBtn(btn, sessionId) {
  const reg = regMap[sessionId];
  btn.disabled = false;
  if (!reg || reg.state === 'cancelled') {
    btn.className = reg ? 'reg-btn cancelled' : 'reg-btn';
    btn.textContent = reg ? 'Cancelled — register again' : 'Register';
  } else {
    btn.className = 'reg-btn registered';
    btn.textContent = 'Registered — cancel?';
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderGatherings(gatherings) {
  const container = document.getElementById('gatherings-list');
  if (!gatherings || gatherings.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No gatherings on record yet.</p></div>';
    return;
  }

  gatherings.sort((a, b) => {
    const aFirst = a.sessions && a.sessions.length ? a.sessions[0].starts_at : a.created_at;
    const bFirst = b.sessions && b.sessions.length ? b.sessions[0].starts_at : b.created_at;
    const aPast = isPast(aFirst), bPast = isPast(bFirst);
    if (aPast !== bPast) return aPast ? 1 : -1;
    return new Date(aFirst) - new Date(bFirst);
  });

  container.innerHTML = '';
  gatherings.forEach(g => {
    const sessions = (g.sessions || []).slice().sort((a, b) => new Date(a.starts_at) - new Date(b.starts_at));
    const firstSession = sessions[0];
    const past = firstSession ? isPast(firstSession.starts_at) : false;
    const hostName = g.agents ? g.agents.display_name : 'Unknown';

    const card = document.createElement('div');
    card.className = 'gathering-card';

    const statusChip = past
      ? '<span class="past-chip">past</span>'
      : '<span class="upcoming-chip">upcoming</span>';

    let sessionsHtml;
    if (sessions.length === 0) {
      sessionsHtml = '<div class="no-sessions">No sessions scheduled.</div>';
    } else {
      const rows = sessions.map(s => {
        const dotClass = isPast(s.starts_at) ? 'session-dot past' : 'session-dot';
        const dur = durationMinutes(s.starts_at, s.ends_at);
        const durHtml = dur ? `<span class="session-duration">${dur}</span>` : '';
        const regBtnId = `reg-${s.id}`;
        const reg = regMap[s.id];
        let btnClass = 'reg-btn', btnText = 'Register';
        if (reg && reg.state === 'registered') { btnClass = 'reg-btn registered'; btnText = 'Registered \u2014 cancel?'; }
        if (reg && reg.state === 'cancelled')  { btnClass = 'reg-btn cancelled';  btnText = 'Cancelled \u2014 register again'; }
        const regBtn = past ? '' : `<button class="${btnClass}" id="${regBtnId}" data-session="${s.id}">${btnText}</button>`;
        return `<div class="session-row">
          <span class="${dotClass}"></span>
          <span class="session-time">${formatDate(s.starts_at)} &middot; ${formatTime(s.starts_at)}</span>
          ${durHtml}${regBtn}
        </div>`;
      }).join('');
      sessionsHtml = `<div class="sessions-list"><div class="sessions-label">Sessions</div>${rows}</div>`;
    }

    card.innerHTML = `
      <div class="gathering-header">
        <div>
          <div class="gathering-title">${escHtml(g.title)}</div>
          <div class="gathering-host">Hosted by <span>${escHtml(hostName)}</span></div>
        </div>
        ${statusChip}
      </div>
      ${sessionsHtml}`;

    container.appendChild(card);

    // wire registration buttons
    sessions.forEach(s => {
      const btn = document.getElementById(`reg-${s.id}`);
      if (btn) {
        btn.addEventListener('click', () => handleRegBtn(btn, s.id));
      }
    });
  });
}

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadAll(session) {
  document.getElementById('content').style.display = 'block';

  // Resolve current agent from agents table
  const { data: agents } = await sb.from('agents').select('id,auth_user_id');
  const self = agents && agents.find(a => a.auth_user_id === session.user.id);
  currentAgentId = self ? self.id : null;

  // Load gatherings + sessions
  const { data: gatherings, error: gErr } = await sb
    .from('gatherings')
    .select('*, agents(display_name), sessions(*)')
    .order('created_at', { ascending: true });

  if (gErr) {
    document.getElementById('gatherings-list').innerHTML =
      `<div class="notice err" style="display:block">Error loading gatherings: ${escHtml(gErr.message)}</div>`;
    return;
  }

  // Collect all session IDs and load registrations for self
  const sessionIds = (gatherings || []).flatMap(g => (g.sessions || []).map(s => s.id));
  if (sessionIds.length > 0 && currentAgentId) {
    const { data: regs } = await sb
      .from('registrations')
      .select('*')
      .in('session_id', sessionIds);
    (regs || []).forEach(r => { regMap[r.session_id] = r; });
  }

  renderGatherings(gatherings);
}

// ── Auth ──────────────────────────────────────────────────────────────────────

function wireMagicLink() {
  const emailInput = document.getElementById('magic-email');
  const btn = document.getElementById('magic-btn');
  const notice = document.getElementById('magic-notice');

  function showNotice(cls, msg) {
    notice.className = 'notice ' + cls; notice.textContent = msg; notice.style.display = 'block';
  }

  btn.addEventListener('click', async function () {
    const email = emailInput.value.trim();
    if (!email) { showNotice('err', 'Enter your email address.'); return; }
    btn.disabled = true; btn.textContent = 'Sending\u2026';
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
    if (error) { showNotice('err', error.message); btn.disabled = false; btn.textContent = 'Send sign-in link'; }
    else { showNotice('ok', 'Check your email for a sign-in link.'); btn.textContent = 'Link sent'; }
  });
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
}

(async function init() {
  sb = window.supabase.createClient(SUPABASE_URL, ANON_KEY);
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById('loading').style.display = 'none';

  if (!session) {
    document.getElementById('auth-gate').style.display = 'block';
    wireMagicLink();
    return;
  }

  await loadAll(session);

  sb.auth.onAuthStateChange(async (event, s) => {
    if (event === 'SIGNED_IN' && s) {
      document.getElementById('auth-gate').style.display = 'none';
      await loadAll(s);
    }
    if (event === 'SIGNED_OUT') {
      document.getElementById('content').style.display = 'none';
      document.getElementById('auth-gate').style.display = 'block';
    }
  });
})();
</script>
</body>
</html>
